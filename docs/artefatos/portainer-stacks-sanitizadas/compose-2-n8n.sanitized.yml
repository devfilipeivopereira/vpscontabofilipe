    - NODE_FUNCTION_ALLOW_BUILTIN=<set:NODE_FUNCTION_ALLOW_BUILTIN>
    - NODE_FUNCTION_ALLOW_EXTERNAL=<set:NODE_FUNCTION_ALLOW_EXTERNAL>
    - GENERIC_TIMEZONE=<set:GENERIC_TIMEZONE>
    - TZ=<set:TZ>
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1024M
  n8n_redis:
    image: redis:latest
    command:
    - redis-server
    - --appendonly
    - 'yes'
    - --port
    - '6379'
    volumes:
    - n8n_redis:/data
    networks:
    - FilipeNet
    deploy:
      placement:
        constraints:
        - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1024M
volumes:
  n8n_redis:
    external: true
    name: n8n_redis
networks:
  FilipeNet:
    external: true
    name: FilipeNet

# Sanitized snapshot generated from Portainer compose backup
# compose_id: 1
# stack_name: postgres
# Sensitive values were replaced with placeholders.
version: '3.7'
services:
  postgres:
    image: postgres:14
    command: 'postgres -c max_connections=500 -c shared_buffers=512MB -c timezone=America/Sao_Paulo

      '
    volumes:
    - postgres_data:/var/lib/postgresql/data
    networks:
    - FilipeNet
    environment:
    - POSTGRES_PASSWORD=<redacted:POSTGRES_PASSWORD>
    - TZ=<set:TZ>
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1024M
volumes:
  postgres_data:
    external: true
    name: postgres_data
networks:
  FilipeNet:
    external: true
    name: FilipeNet

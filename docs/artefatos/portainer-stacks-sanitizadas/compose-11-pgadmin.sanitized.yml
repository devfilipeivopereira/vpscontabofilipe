# Sanitized snapshot generated from Portainer compose backup
# compose_id: 11
# stack_name: pgadmin
# Sensitive values were replaced with placeholders.
version: '3.7'
services:
  pgadmin:
    image: dpage/pgadmin4:latest
    volumes:
    - pgadmin_data:/var/lib/pgadmin
    networks:
    - FilipeNet
    environment:
    - PGADMIN_DEFAULT_EMAIL=<set:PGADMIN_DEFAULT_EMAIL>
    - PGADMIN_DEFAULT_PASSWORD=<redacted:PGADMIN_DEFAULT_PASSWORD>
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1024M
      labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.filipeivopereira.com`)
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
      - traefik.http.routers.pgadmin.service=pgadmin
      - traefik.http.routers.pgadmin.tls.certresolver=letsencryptresolver
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
volumes:
  pgadmin_data:
    external: true
networks:
  FilipeNet:
    name: FilipeNet
    external: true

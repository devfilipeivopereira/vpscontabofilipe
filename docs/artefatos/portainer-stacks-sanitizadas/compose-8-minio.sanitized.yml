# Sanitized snapshot generated from Portainer compose backup
# compose_id: 8
# stack_name: minio
# Sensitive values were replaced with placeholders.
version: '3.7'
services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
    - minio_data:/data
    networks:
    - FilipeNet
    environment:
    - MINIO_ROOT_USER=<set:MINIO_ROOT_USER>
    - MINIO_ROOT_PASSWORD=<redacted:MINIO_ROOT_PASSWORD>
    - MINIO_BROWSER_REDIRECT_URL=<redacted:MINIO_BROWSER_REDIRECT_URL>
    - MINIO_SERVER_URL=<redacted:MINIO_SERVER_URL>
    - MINIO_REGION_NAME=<set:MINIO_REGION_NAME>
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
        - node.role == manager
      labels:
      - traefik.enable=true
      - traefik.http.routers.minio_public.rule=Host(`s3.filipeivopereira.com`)
      - traefik.http.routers.minio_public.entrypoints=websecure
      - traefik.http.routers.minio_public.tls.certresolver=letsencryptresolver
      - traefik.http.services.minio_public.loadbalancer.server.port=9000
      - traefik.http.services.minio_public.loadbalancer.passHostHeader=true
      - traefik.http.routers.minio_public.service=minio_public
      - traefik.http.routers.minio_console.rule=Host(`minio.filipeivopereira.com`)
      - traefik.http.routers.minio_console.entrypoints=websecure
      - traefik.http.routers.minio_console.tls.certresolver=letsencryptresolver
      - traefik.http.services.minio_console.loadbalancer.server.port=9001
      - traefik.http.services.minio_console.loadbalancer.passHostHeader=true
      - traefik.http.routers.minio_console.service=minio_console
volumes:
  minio_data:
    external: true
    name: minio_data
networks:
  FilipeNet:
    external: true
    name: FilipeNet
